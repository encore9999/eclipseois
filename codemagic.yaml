workflows:
  ios-vpn-build:
    name: Build iOS VPN App
    max_build_duration: 30
    instance_type: mac_mini_m1
    environment:
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
    scripts:
      - name: Disable Code Signing for Sideloading
        script: |
          # Отключаем обязательную подпись Xcode, чтобы собрать .ipa на облачном Mac
          sed -i '' 's/CODE_SIGNING_ALLOWED = YES/CODE_SIGNING_ALLOWED = NO/g' *.xcodeproj/project.pbxproj || true
          sed -i '' 's/CODE_SIGNING_REQUIRED = YES/CODE_SIGNING_REQUIRED = NO/g' *.xcodeproj/project.pbxproj || true
      - name: Build Xcode Project
        script: |
          # ВНИМАНИЕ: Замените "YourProject" на точное имя вашего .xcodeproj файла (без расширения)
          XCODE_PROJECT=$(ls -d *.xcodeproj | head -n 1)
          XCODE_SCHEME=$(basename "$XCODE_PROJECT" .xcodeproj)
          
          xcodebuild clean build \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO
      - name: Pack to IPA
        script: |
          # Собираем скомпилированные файлы в итоговый .ipa архив
          mkdir -p Payload
          cp -r build/Release-iphoneos/*.app Payload/
          zip -r YourVPNApp.ipa Payload/
    artifacts:
      - "*.ipa"
