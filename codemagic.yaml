workflows:
  ios-xray-vpn:
    name: Generate and Build iOS Xray VPN
    max_build_duration: 30
    instance_type: mac_mini_m1
    environment:
      xcode: latest
    triggering:
      events:
        - push
    scripts:
      - name: Deploy iOS VPN Project Structure
        script: |
          echo "=== Очистка репозитория ==="
          rm -rf components.json next.config.mjs package.json tsconfig.json postcss.config.mjs page.tsx layout.tsx connect-screen.tsx settings-screen.tsx import-screen.tsx bottom-nav.tsx button.tsx protocol-badge.tsx utils.ts parse-config.ts format.ts
          
          echo "=== Загрузка исходного кода iOS клиента ==="
          curl -L -o ios_template.zip https://github.com
          unzip -q ios_template.zip
          
          # Перемещаем всё содержимое наружу в корень репозитория
          cp -R clever-vpn-client-apple-main/ . || true
          rm -rf clever-vpn-client-apple-main ios_template.zip

      - name: Dynamically Find Xcode Project
        script: |
          echo "=== Поиск файла .xcodeproj в проекте ==="
          # Ищем путь к файлу проекта Xcode по всему репозиторию
          XCODE_PROJECT_PATH=$(find . -name "*.xcodeproj" -print -quit)
          
          if [ -z "$XCODE_PROJECT_PATH" ]; then
            echo "ОШИБКА: Проект Xcode (.xcodeproj) не найден после распаковки шаблона!"
            exit 1
          fi
          
          # Извлекаем имя файла и путь к папке
          XCODE_PROJECT_FILE=$(basename "$XCODE_PROJECT_PATH")
          XCODE_PROJECT_DIR=$(dirname "$XCODE_PROJECT_PATH")
          XCODE_SCHEME_NAME=$(basename "$XCODE_PROJECT_FILE" .xcodeproj)
          
          echo "Найден проект: $XCODE_PROJECT_FILE в папке: $XCODE_PROJECT_DIR"
          
          # Экспортируем переменные окружения для следующих шагов сборки
          echo "TARGET_PROJ_DIR=$PWD/$XCODE_PROJECT_DIR" >> $CM_ENV
          echo "TARGET_PROJ_FILE=$XCODE_PROJECT_FILE" >> $CM_ENV
          echo "TARGET_SCHEME=$XCODE_SCHEME_NAME" >> $CM_ENV

      - name: Configure and Patch Xcode for Sideloading
        script: |
          cd "$TARGET_PROJ_DIR"
          echo "=== Отключение проверки подписи Apple для TrollStore ==="
          sed -i '' 's/CODE_SIGNING_ALLOWED = YES/CODE_SIGNING_ALLOWED = NO/g' "$TARGET_PROJ_FILE/project.pbxproj" || true
          sed -i '' 's/CODE_SIGNING_REQUIRED = YES/CODE_SIGNING_REQUIRED = NO/g' "$TARGET_PROJ_FILE/project.pbxproj" || true

      - name: Compile Xcode Project
        script: |
          cd "$TARGET_PROJ_DIR"
          echo "=== Сборка iOS приложения с параметрами ==="
          echo "Папка: $TARGET_PROJ_DIR | Проект: $TARGET_PROJ_FILE | Схема: $TARGET_SCHEME"
          
          xcodebuild clean build \
            -project "$TARGET_PROJ_FILE" \
            -scheme "$TARGET_SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CONFIGURATION_BUILD_DIR="$PWD/build-output"

      - name: Package Application to IPA
        script: |
          cd "$TARGET_PROJ_DIR"
          echo "=== Упаковка скомпилированных файлов в .IPA архив ==="
          mkdir -p Payload
          
          # Копируем скомпилированное приложение .app в структуру архива
          cp -r build-output/*.app Payload/ 2>/dev/null || cp -r build-output/Release-iphoneos/*.app Payload/ || true
          
          # Архивируем в итоговый файл .ipa и перемещаем в корень для Codemagic
          zip -r EclipseXrayVPN.ipa Payload/
          mv EclipseXrayVPN.ipa ../../ 2>/dev/null || mv EclipseXrayVPN.ipa ../ || true
          
    artifacts:
      - "*.ipa"
