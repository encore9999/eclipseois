workflows:
  ios-xray-vpn:
    name: Generate and Build iOS Xray VPN
    max_build_duration: 30
    instance_type: mac_mini_m1
    environment:
      xcode: latest
    triggering:
      events:
        - push
    scripts:
      - name: Clean Repository and Install Tools
        script: |
          echo "=== Очистка репозитория ==="
          rm -rf components.json next.config.mjs package.json tsconfig.json postcss.config.mjs page.tsx layout.tsx connect-screen.tsx settings-screen.tsx import-screen.tsx bottom-nav.tsx button.tsx protocol-badge.tsx utils.ts parse-config.ts format.ts pnpm-lock.yaml apple-icon.png eclipse-vpn-client.zip download
          
          echo "=== Установка XcodeGen ==="
          brew install xcodegen

      - name: Generate Source Code and Plists
        script: |
          echo "=== Создание структуры проекта ==="
          mkdir -p App Tunnel
          
          # 1. Основной UI код приложения
          cat << 'EOF' > App/main.swift
          import SwiftUI

          @main
          struct VPNApp: App {
              var body: some Scene {
                  WindowGroup {
                      VStack {
                          Text("Eclipse Xray VPN")
                              .font(.largeTitle)
                              .bold()
                          Button("Запустить туннель Xray") {
                              print("Инициализация VPN...")
                          }
                          .padding()
                          .background(Color.blue)
                          .foregroundColor(.white)
                          .cornerRadius(10)
                      }
                  }
              }
          }
          EOF

          # 2. Исходный код системного туннеля VPN
          cat << 'EOF' > Tunnel/TunnelProvider.swift
          import NetworkExtension

          class TunnelProvider: NEPacketTunnelProvider {
              override func startTunnel(options: [String : NSObject]?, completionHandler: @escaping (Error?) -> Void) {
                  // Здесь запускается ядро Xray Core (LibXray / SwiftyXrayKit)
                  completionHandler(nil)
              }
              
              override func stopTunnel(with reason: NEProviderStopReason, completionHandler: @escaping () -> Void) {
                  completionHandler()
              }
          }
          EOF

          # 3. Файл манифеста Info.plist для регистрации VPN-плагина в iOS
          cat << 'EOF' > Tunnel/Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://apple.com">
          <plist version="1.0">
          <dict>
              <key>NSExtension</key>
              <dict>
                  <key>NSExtensionPointIdentifier</key>
                  <string>com.apple.networkextension.packet-tunnel</string>
                  <key>NSExtensionPrincipalClass</key>
                  <string>TunnelExtension.TunnelProvider</string>
              </dict>
          </dict>
          </plist>
          EOF

          # 4. Исправленная конфигурация проекта для XcodeGen
          cat << 'EOF' > project.yml
          name: EclipseVPN
          options:
            bundleIdPrefix: com.eclipse
          targets:
            EclipseVPN:
              type: application
              platform: iOS
              deploymentTarget: "16.0"
              sources: [App]
              dependencies:
                - target: TunnelExtension
            TunnelExtension:
              type: app-extension
              platform: iOS
              deploymentTarget: "16.0"
              sources: [Tunnel]
              settings:
                PRODUCT_BUNDLE_IDENTIFIER: com.eclipse.TunnelExtension
          EOF

      - name: Generate .xcodeproj File
        script: |
          echo "=== Генерация файла проекта ==="
          xcodegen generate

      - name: Patch Framework Signing for TrollStore
        script: |
          echo "=== Отключение подписи Xcode ==="
          sed -i '' 's/CODE_SIGNING_ALLOWED = YES/CODE_SIGNING_ALLOWED = NO/g' EclipseVPN.xcodeproj/project.pbxproj || true
          sed -i '' 's/CODE_SIGNING_REQUIRED = YES/CODE_SIGNING_REQUIRED = NO/g' EclipseVPN.xcodeproj/project.pbxproj || true

      - name: Build Xcode Project
        script: |
          echo "=== Запуск компиляции нативного VPN ==="
          xcodebuild clean build \
            -project "EclipseVPN.xcodeproj" \
            -scheme "EclipseVPN" \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CONFIGURATION_BUILD_DIR="$PWD/build-output"

      - name: Package to IPA
        script: |
          echo "=== Сборка готового .ipa ==="
          mkdir -p Payload
          cp -r build-output/EclipseVPN.app Payload/
          zip -r EclipseXrayVPN.ipa Payload/
          
    artifacts:
      - "*.ipa"
