workflows:
  ios-xray-vpn:
    name: Generate and Build iOS Xray VPN
    max_build_duration: 30
    instance_type: mac_mini_m1
    environment:
      xcode: latest
    triggering:
      events:
        - push
    scripts:
      - name: Clean Repository and Install Tools
        script: |
          echo "=== Полная очистка веб-файлов ==="
          rm -rf components.json next.config.mjs package.json tsconfig.json postcss.config.mjs page.tsx layout.tsx connect-screen.tsx settings-screen.tsx import-screen.tsx bottom-nav.tsx button.tsx protocol-badge.tsx utils.ts parse-config.ts format.ts pnpm-lock.yaml apple-icon.png eclipse-vpn-client.zip download
          
          echo "=== Установка генератора проектов Xcode ==="
          brew install xcodegen

      - name: Generate Code and Project Definition
        script: |
          echo "=== Создание исходного кода приложения ==="
          mkdir -p App Tunnel
          
          # 1. Код основного приложения
          cat << 'EOF' > App/main.swift
          import SwiftUI

          @main
          struct VPNApp: App {
              var body: some Scene {
                  WindowGroup {
                      VStack {
                          Text("Eclipse Xray VPN")
                              .font(.largeTitle)
                              .bold()
                          Button("Подключить VPN") {
                              print("Запуск туннеля...")
                          }
                          .padding()
                          .background(Color.blue)
                          .foregroundColor(.white)
                          .cornerRadius(10)
                      }
                  }
              }
          }
          EOF

          # 2. Код системного VPN-туннеля
          cat << 'EOF' > Tunnel/TunnelProvider.swift
          import NetworkExtension

          class TunnelProvider: NEPacketTunnelProvider {
              override func startTunnel(options: [String : NSObject]?, completionHandler: @escaping (Error?) -> Void) {
                  // Здесь запускается ядро Xray core
                  completionHandler(nil)
              }
              
              override func stopTunnel(with reason: NEProviderStopReason, completionHandler: @escaping () -> Void) {
                  completionHandler()
              }
          }
          EOF

          # 3. Файл конфигурации проекта для XcodeGen
          cat << 'EOF' > project.yml
          name: EclipseVPN
          options:
            bundleIdPrefix: com.eclipse
          targets:
            EclipseVPN:
              type: application
              platform: iOS
              deploymentTarget: "16.0"
              sources: [App]
              dependencies:
                - target: TunnelExtension
            TunnelExtension:
              type: app-extension.packet-tunnel-provider
              platform: iOS
              deploymentTarget: "16.0"
              sources: [Tunnel]
          EOF

      - name: Generate .xcodeproj File
        script: |
          echo "=== Генерация файла проекта .xcodeproj ==="
          xcodegen generate

      - name: Patch for TrollStore Sideloading
        script: |
          echo "=== Отключение обязательной платной подписи Apple ==="
          sed -i '' 's/CODE_SIGNING_ALLOWED = YES/CODE_SIGNING_ALLOWED = NO/g' EclipseVPN.xcodeproj/project.pbxproj || true
          sed -i '' 's/CODE_SIGNING_REQUIRED = YES/CODE_SIGNING_REQUIRED = NO/g' EclipseVPN.xcodeproj/project.pbxproj || true

      - name: Build Xcode Project
        script: |
          echo "=== Компиляция созданного проекта ==="
          xcodebuild clean build \
            -project "EclipseVPN.xcodeproj" \
            -scheme "EclipseVPN" \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CONFIGURATION_BUILD_DIR="$PWD/build-output"

      - name: Export to IPA Package
        script: |
          echo "=== Упаковка бинарных файлов в .ipa ==="
          mkdir -p Payload
          cp -r build-output/EclipseVPN.app Payload/
          zip -r EclipseXrayVPN.ipa Payload/
          
    artifacts:
      - "*.ipa"
