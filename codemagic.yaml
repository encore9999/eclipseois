workflows:
  ios-xray-vpn:
    name: Generate and Build iOS Xray VPN
    max_build_duration: 15
    instance_type: mac_mini_m1
    environment:
      xcode: latest
    triggering:
      events:
        - push
    scripts:
      - name: Purge Web Files and Prepare Structure
        script: |
          echo "=== Очистка старого репозитория ==="
          rm -rf components.json next.config.mjs package.json tsconfig.json postcss.config.mjs page.tsx layout.tsx connect-screen.tsx settings-screen.tsx import-screen.tsx bottom-nav.tsx button.tsx protocol-badge.tsx utils.ts parse-config.ts format.ts pnpm-lock.yaml apple-icon.png eclipse-vpn-client.zip download build-output Project.xcodeproj project.yml App Tunnel main.swift app.swift
          
          # Создаем структуру папок приложения
          mkdir -p build-output/EclipseVPN.app

      - name: Create Info.plist Manifests
        script: |
          echo "=== Gen системных манифестов ==="
          
          # Создаем Info.plist для приложения
          cat << 'EOF' > build-output/EclipseVPN.app/Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://apple.com">
          <plist version="1.0">
          <dict>
              <key>CFBundleIdentifier</key>
              <string>com.eclipse.EclipseVPN</string>
              <key>CFBundleExecutable</key>
              <string>EclipseVPN</string>
              <key>CFBundleName</key>
              <string>EclipseVPN</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0</string>
              <key>CFBundleVersion</key>
              <string>1</string>
              <key>MinimumOSVersion</key>
              <string>16.0</string>
              <key>UIDeviceFamily</key>
              <array>
                  <integer>1</integer>
              </array>
          </dict>
          </plist>
          EOF

      - name: Write Application Swift Code
        script: |
          echo "=== Написание исходного кода ==="
          # Меняем имя файла на app.swift, чтобы убрать конфликт с верхнеуровневым кодом main
          cat << 'EOF' > app.swift
          import SwiftUI

          struct MainView: View {
              var body: some View {
                  VStack(spacing: 20) {
                      Text("Eclipse Xray VPN")
                          .font(.largeTitle)
                          .bold()
                          .foregroundColor(.primary)
                      
                      Text("Статус: Отключено")
                          .font(.headline)
                          .foregroundColor(.secondary)
                      
                      Button(action: {
                          print("Старт туннеля Xray...")
                      }) {
                          Text("Подключить VPN")
                              .font(.title3)
                              .bold()
                              .foregroundColor(.white)
                              .padding()
                              .frame(maxWidth: .infinity)
                              .background(Color.blue)
                              .cornerRadius(12)
                      }
                      .padding(.horizontal, 40)
                  }
                  .padding()
              }
          }

          @main
          struct VPNApp: App {
              var body: some Scene {
                  WindowGroup {
                      MainView()
                  }
              }
          }
          EOF

      - name: Compile Swift Code to Native Arm64 Binary
        script: |
          echo "=== Прямая компиляция Swift в обход Xcode ==="
          
          # Получаем путь к мобильному SDK iOS
          SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)
          
          # Компилируем код напрямую под процессор iPhone (arm64) с флагом -parse-as-library
          swiftc -sdk "$SDK_PATH" \
                 -target arm64-apple-ios16.0 \
                 -parse-as-library \
                 -O -whole-module-optimization \
                 app.swift \
                 -o build-output/EclipseVPN.app/EclipseVPN

      - name: Package Application to TrollStore IPA
        script: |
          echo "=== Финальная сборка .ipa ==="
          mkdir -p Payload
          cp -r build-output/EclipseVPN.app Payload/
          zip -qy -r EclipseXrayVPN.ipa Payload
          
    artifacts:
      - "*.ipa"
